<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>OJT Daily Time Record – ZenPen Style | Smart Fill DTR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="settings-bar">
  <span class="brand"> DTR · SMART FILL </span>
  <div class="s-group"><label>name</label><input type="text" id="cfgName" value="" placeholder="" style="width:170px" oninput="updateNameAndSave(); scheduleSave()"></div>
  <div class="s-group"><label>month 1</label><select id="cfgMonth1" onchange="onMonthChange()">
      <option value="0">January</option><option value="1">February</option><option value="2">March</option><option value="3">April</option><option value="4" selected>May</option>
      <option value="5">June</option><option value="6">July</option><option value="7">August</option><option value="8">September</option><option value="9">October</option>
      <option value="10">November</option><option value="11">December</option>
    </select></div>
  <div class="s-group"><label>month 2</label><select id="cfgMonth2" onchange="onMonthChange()">
      <option value="0">January</option><option value="1">February</option><option value="2">March</option><option value="3">April</option><option value="4">May</option>
      <option value="5" selected>June</option><option value="6">July</option><option value="7">August</option><option value="8">September</option><option value="9">October</option>
      <option value="10">November</option><option value="11">December</option>
    </select></div>
  <div class="s-group"><label>year</label><input type="number" id="cfgYear" value="2026" min="2020" max="2040" style="width:78px" onchange="onYearChange()"></div>
  <div class="s-group"><label>theme</label><input type="color" id="cfgColor" value="#1a3a5c" oninput="applyColor(this.value); scheduleSave()"></div>
  <span class="saved-indicator" id="savedIndicator">saved</span>
  <button class="btn" onclick="window.print()">🖶 PRINT / PDF</button>
  <button class="btn btn-red" onclick="clearAllRecords()">✕ CLEAR ALL</button>
</div>

<div class="paper-wrap">
  <div class="paper">
    <div class="dtr-columns">
      <div class="dtr-block" id="block1"></div>
      <div class="dtr-block" id="block2"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
